<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100"
        fill="#080a0f"/>

  <!-- Border -->
  <rect x="8" y="8" width="496" height="496"
        rx="95" fill="none"
        stroke="#e8192c" stroke-width="8"/>

  <!-- S Letter -->
  <text x="256" y="340"
        font-family="Arial Black, sans-serif"
        font-size="280"
        font-weight="900"
